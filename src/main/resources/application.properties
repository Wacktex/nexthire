# NEXTHIRE Application Configuration

# Server port
server.port=${PORT:8080}

# Application name
spring.application.name=nexthire

# SQLite database configuration
spring.datasource.url=jdbc:sqlite:database/nexthire.db
spring.datasource.driver-class-name=org.sqlite.JDBC

# Disable JPA auto-configuration (we use raw JDBC)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Thymeleaf configuration
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Gemini API Key - Replace with your actual key from https://aistudio.google.com/
gemini.api.key=${GEMINI_API_KEY}

# Logging
logging.level.com.nexthire=INFO
